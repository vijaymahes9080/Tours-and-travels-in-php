<!DOCTYPE HTML>
<html>
<head>
<title>TMS | Enquiry Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<link href="css/bootstrap.css" rel='stylesheet' type='text/css' />
<link href="css/style.css" rel='stylesheet' type='text/css' />
<link href='https://fonts.googleapis.com/css?family=Open+Sans:400,700,600' rel='stylesheet' type='text/css'>
<link href='https://fonts.googleapis.com/css?family=Roboto+Condensed:400,700,300' rel='stylesheet' type='text/css'>
<link href='https://fonts.googleapis.com/css?family=Oswald' rel='stylesheet' type='text/css'>
<link href="css/font-awesome.css" rel="stylesheet">
<script src="js/jquery-1.12.0.min.js"></script>
<script src="js/bootstrap.min.js"></script>
<link href="css/animate.css" rel="stylesheet" type="text/css" media="all">
<script src="js/wow.min.js"></script>
<script>
     new WOW().init();
</script>
</head>
<body>

<div class="banner-3">
	<div class="container">
		<h1 class="wow zoomIn animated animated" data-wow-delay=".5s" style="visibility: visible; animation-delay: 0.5s; animation-name: zoomIn;"> TMS - Enquiry</h1>
	</div>
</div>

<div class="privacy">
	<div class="container">
		<h3 class="wow fadeInDown animated animated" data-wow-delay=".5s" style="visibility: visible; animation-delay: 0.5s; animation-name: fadeInDown;">General Enquiry Form</h3>
		<form id="static-enquiry-form">
			<p style="width: 350px;">
				<b>Full Name</b> <input type="text" name="fname" class="form-control" placeholder="Full Name" required="">
			</p> 
			<p style="width: 350px;">
				<b>Email</b> <input type="email" name="email" class="form-control" placeholder="Valid Email ID" required="">
			</p> 
			<p style="width: 350px;">
				<b>Mobile No</b> <input type="text" name="mobileno" class="form-control" maxlength="10" placeholder="10 Digit Mobile No" required="">
			</p> 
			<p style="width: 350px;">
				<b>Subject</b> <input type="text" name="subject" class="form-control" placeholder="Subject" required="">
			</p> 
			<p style="width: 350px;">
				<b>Description</b> <textarea name="description" class="form-control" rows="6" cols="50" placeholder="Description" required=""></textarea> 
			</p> 
			<p style="width: 350px;">
				<button type="submit" class="btn-primary btn">Submit Enquiry</button>
			</p>
		</form>
	</div>
</div>

<script src="js/static-site.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  const form = document.getElementById('static-enquiry-form');
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    alert("Enquiry submitted successfully! We will get back to you shortly.");
    window.location.href = 'thankyou.html';
  });
});
</script>
</body>
</html>
