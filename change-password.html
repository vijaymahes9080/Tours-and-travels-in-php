<!DOCTYPE HTML>
<html>
<head>
<title>TMS | Change Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<link href="css/bootstrap.css" rel='stylesheet' type='text/css' />
<link href="css/style.css" rel='stylesheet' type='text/css' />
<link href='https://fonts.googleapis.com/css?family=Open+Sans:400,700,600' rel='stylesheet' type='text/css'>
<link href='https://fonts.googleapis.com/css?family=Roboto+Condensed:400,700,300' rel='stylesheet' type='text/css'>
<link href='https://fonts.googleapis.com/css?family=Oswald' rel='stylesheet' type='text/css'>
<link href="css/font-awesome.css" rel="stylesheet">
<script src="js/jquery-1.12.0.min.js"></script>
<script src="js/bootstrap.min.js"></script>
<link href="css/animate.css" rel="stylesheet" type="text/css" media="all">
<script src="js/wow.min.js"></script>
<script>
     new WOW().init();
</script>
</head>
<body>

<div class="banner-3">
	<div class="container">
		<h1 class="wow zoomIn animated animated" data-wow-delay=".5s" style="visibility: visible; animation-delay: 0.5s; animation-name: zoomIn;"> TMS - Change Password</h1>
	</div>
</div>

<div class="privacy">
	<div class="container">
		<h3 class="wow fadeInDown animated animated" data-wow-delay=".5s" style="visibility: visible; animation-delay: 0.5s; animation-name: fadeInDown;">Change Password</h3>
		
		<form id="static-password-form" style="max-width: 500px; margin-top: 30px;">
			<div class="form-group">
				<label>Current Password</label>
				<input type="password" class="form-control" name="currentpwd" placeholder="Current Password" required>
			</div>
			<div class="form-group">
				<label>New Password</label>
				<input type="password" class="form-control" name="newpwd" placeholder="New Password" required>
			</div>
			<div class="form-group">
				<label>Confirm Password</label>
				<input type="password" class="form-control" name="confpwd" placeholder="Confirm Password" required>
			</div>
			<button type="submit" class="btn btn-success">Change Password</button>
		</form>
	</div>
</div>

<script src="js/static-site.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  const form = document.getElementById('static-password-form');
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    const newpwd = e.target.newpwd.value;
    const confpwd = e.target.confpwd.value;

    if (newpwd !== confpwd) {
      alert("New Password and Confirm Password do not match!");
      return;
    }

    const user = getLoggedInUser();
    if (user) {
      const users = getRegisteredUsers();
      if (users[user.email]) {
        users[user.email].password = newpwd;
        localStorage.setItem('registered_users', JSON.stringify(users));
      }
    }

    alert("Password updated successfully!");
    window.location.reload();
  });
});
</script>
</body>
</html>
